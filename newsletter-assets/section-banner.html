<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,500&family=Space+Mono:wght@700&display=swap" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 640px; height: 100px; overflow: hidden; }
  body {
    background: #070B24;
    display: flex; align-items: center; gap: 18px;
    padding: 0 40px;
  }
  .num {
    font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.05em;
    color: #E8B86D; border: 1px solid rgba(232,184,109,0.4); border-radius: 100px;
    padding: 6px 12px; white-space: nowrap;
  }
  .rule { flex: none; width: 20px; height: 1px; background: rgba(255,255,255,0.16); }
  .title {
    font-family: 'Fraunces', serif; font-style: italic; font-weight: 500; font-size: 26px;
    color: #EDF1F7; white-space: nowrap;
  }
</style>
</head>
<body>
  <span class="num">01</span>
  <span class="rule"></span>
  <span class="title">Radar Global</span>
</body>
</html>
